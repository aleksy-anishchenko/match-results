name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NUXT_THE_SPORTS_DB_API_KEY: ${{ secrets.NUXT_THE_SPORTS_DB_API_KEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan 9619862181.myjino.ru >> ~/.ssh/known_hosts

      - name: Deploy files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            .output/ \
            9619862181@9619862181.myjino.ru:domains/matchresults.ru/.output/

          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            app.js \
            9619862181@9619862181.myjino.ru:domains/matchresults.ru/app.js

      - name: Restart app
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 9619862181@9619862181.myjino.ru \
            "mkdir -p ~/domains/matchresults.ru/tmp && touch ~/domains/matchresults.ru/tmp/restart.txt"
