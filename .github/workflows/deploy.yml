name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking=no" >> ~/.ssh/config

      - name: Deploy files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            .output/ \
            root@62.132.3.59:/var/www/matchresults/.output/

      - name: Restart app
        run: |
          ssh -i ~/.ssh/deploy_key root@62.132.3.59 \
            "cd /var/www/matchresults && pm2 restart matchresults || pm2 start .output/server/index.mjs --name matchresults"
